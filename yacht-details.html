      padding: 0;

      --cyan-hover: #00a8e0;
      --navy: #0D1B4B;
      --heading-font: 'Barlow Condensed', sans-serif;
      --yacht-name-font: 'Bebas Neue', sans-serif;
      --body-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--body-font);
      background: #f5f5f5;
      color: #1a1a2e;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ───────────── TOP NAVBAR ───────────── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      background: var(--navy);
      border-bottom: 1px solid rgba(0, 191, 255, 0.3);
      transition: box-shadow 0.35s ease;
    }

    .navbar.scrolled {
      box-shadow: 0 2px 24px rgba(0, 0, 0, 0.3);
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: -20px 0;
      text-decoration: none;
    }

    .navbar-logo img {
      height: 96px;
      width: auto;
    }

    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-gallery-nav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      font-family: var(--heading-font);
      letter-spacing: 0.5px;
      border: 2px solid #fff;
      border-radius: 999px;
      padding: 14px 36px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
    }

    .btn-gallery-nav:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(255, 255, 255, 0.15);
    }

    .btn-book-nav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--cyan);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      font-family: var(--heading-font);
      letter-spacing: 0.5px;
      border: none;
      border-radius: 999px;
      padding: 14px 36px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
    }

    .btn-book-nav:hover {
      background: var(--cyan-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(0, 191, 255, 0.35);
    }

    /* ───────────── BACK NAV ───────────── */
    .back-nav {
      padding: 28px 40px 16px;
      padding-top: 100px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--heading-font);
      font-weight: 700;
      font-size: 16px;
      color: var(--navy);
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .back-link:hover {
      opacity: 0.65;
    }

    .back-link svg {
      width: 20px;
      height: 20px;
    }

    /* ───────────── CAROUSEL ───────────── */
    .carousel-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px 0;
    }

    .carousel {
      position: relative;
      width: 100%;
      height: 600px;
      border-radius: 16px;
      overflow: hidden;
      background: #ddd;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .carousel-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .carousel-slide.active {
      opacity: 1;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      transition: background 0.2s ease, transform 0.2s ease;
      z-index: 5;
      font-size: 22px;
      color: var(--navy);
    }

    .carousel-btn:hover {
      background: #fff;
      transform: translateY(-50%) scale(1.08);
    }

    .carousel-btn.prev { left: 16px; }
    .carousel-btn.next { right: 16px; }

    /* ───────────── DETAIL CONTENT ───────────── */
    .detail-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px;
    }

    .detail-card {
      background: #fff;
      border-radius: 16px;
      padding: 44px 48px;
      margin-top: 28px;
      margin-bottom: 48px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .detail-name {
      font-family: var(--yacht-name-font);
      font-weight: 400;
      font-size: clamp(40px, 5vw, 56px);
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .detail-price {
      font-family: var(--heading-font);
      font-weight: 600;
      font-size: 20px;
      color: #888;
      margin-bottom: 24px;
    }

    .detail-description {
      font-size: 16px;
      color: #444;
      line-height: 1.7;
      max-width: 680px;
      margin-bottom: 32px;
    }

    .btn-book-detail {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--cyan);
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      font-family: var(--heading-font);
      letter-spacing: 0.5px;
      border: none;
      border-radius: 999px;
      padding: 14px 36px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
    }

    .btn-book-detail:hover {
      background: var(--cyan-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0, 191, 255, 0.4);
    }

    /* ───────────── SPECS ROW ───────────── */
    .specs-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      margin-bottom: 28px;
      background: #F3F4F6;
      border-radius: 12px;
      padding: 16px 24px;
    }

    .spec-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 0;
    }

    .spec-item:not(:last-child) {
      border-right: 1px solid #e0e0e0;
      padding-right: 24px;
      margin-right: 24px;
    }

    .spec-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #888;
      font-weight: 600;
    }

    .spec-value {
      font-family: var(--yacht-name-font);
      font-weight: 400;
      font-size: 24px;
      letter-spacing: 0.5px;
      color: var(--navy);
    }

    /* ───────────── BOOKING MODAL ───────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .modal-backdrop.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: #fff;
      border-radius: 20px;
      max-width: 480px;
      width: 90%;
      padding: 48px 40px;
      position: relative;
      transform: scale(0.95);
      transition: transform 0.2s ease;
    }

    .modal-backdrop.active .modal {
      transform: scale(1);
    }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 20px;
      background: none;
      border: none;
      font-size: 24px;
      color: #555;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .modal-close:hover {
      color: #000;
    }

    .modal-heading {
      font-family: var(--heading-font);
      font-weight: 800;
      font-size: 30px;
      color: #111;
      text-align: center;
      margin-bottom: 8px;
    }

    .modal-subtext {
      font-size: 16px;
      color: #666;
      text-align: center;
      margin-bottom: 36px;
    }

    .modal-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-btn {
      display: block;
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: 999px;
      font-family: var(--heading-font);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.3px;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .modal-btn:hover {
      transform: translateY(-1px);
    }

    .modal-btn-call {
      background: var(--navy);
      color: #fff;
    }

    .modal-btn-call:hover {
      box-shadow: 0 6px 20px rgba(13, 27, 75, 0.35);
    }

    .modal-btn-wa {
      background: #25D366;
      color: #fff;
    }

    .modal-btn-wa:hover {
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.35);
    }

    /* ───────────── RESPONSIVE ───────────── */
    @media (max-width: 768px) {
      .navbar { padding: 16px 20px; }
      .back-nav { padding: 20px 20px 12px; }
      .carousel-wrapper { padding: 0 20px; }
      .carousel { height: 360px; }
      .detail-content { padding: 0 20px; }
      .detail-card { padding: 28px 24px; }
      .carousel-btn { width: 40px; height: 40px; font-size: 18px; }
    }

    @media (max-width: 480px) {
      .carousel { height: 260px; }
      .detail-card { padding: 24px 20px; }
      .specs-row { padding: 12px 16px; }
      .spec-item:not(:last-child) { padding-right: 12px; margin-right: 12px; }
      .btn-gallery-nav { padding: 10px 20px; font-size: 14px; }
      .btn-book-nav { padding: 10px 20px; font-size: 14px; }
    }

    document.title = yacht.name + ' — Yacht Rental';

    // Populate content
    document.getElementById('yachtName').textContent = yacht.name;
    document.getElementById('yachtPrice').textContent = 'Starting at ' + yacht.price;
    document.getElementById('yachtDesc').textContent = yacht.description;

    // Specs
    const specs = [
      { label: 'Length', value: yacht.length },
      { label: 'Guests', value: yacht.guests },
      { label: 'Crew', value: yacht.crew }
    ];
    const specsRow = document.getElementById('specsRow');
    specs.forEach(s => {
      const item = document.createElement('div');
      item.className = 'spec-item';
      item.innerHTML = '<span class="spec-label">' + s.label + '</span><span class="spec-value">' + s.value + '</span>';
      specsRow.appendChild(item);
    });

    // Build carousel
    const carousel = document.getElementById('carousel');
    let currentSlide = 0;

    yacht.images.forEach((src, i) => {
      const slide = document.createElement('div');
      slide.className = 'carousel-slide' + (i === 0 ? ' active' : '');
      const img = document.createElement('img');
      img.src = src;
      img.alt = yacht.name + ' — luxury yacht rental Miami, photo ' + (i + 1);
      slide.appendChild(img);
      carousel.insertBefore(slide, document.getElementById('prevBtn'));
    });

    const slides = carousel.querySelectorAll('.carousel-slide');

    function goToSlide(index) {
      slides[currentSlide].classList.remove('active');
      currentSlide = (index + slides.length) % slides.length;
      slides[currentSlide].classList.add('active');
    }

    document.getElementById('nextBtn').addEventListener('click', () => goToSlide(currentSlide + 1));
    document.getElementById('prevBtn').addEventListener('click', () => goToSlide(currentSlide - 1));

    // Auto-advance every 5s
    let autoPlay = setInterval(() => goToSlide(currentSlide + 1), 5000);
    carousel.addEventListener('mouseenter', () => clearInterval(autoPlay));
    carousel.addEventListener('mouseleave', () => {
      autoPlay = setInterval(() => goToSlide(currentSlide + 1), 5000);
    });

    // Navbar scroll effect
    const navbar = document.getElementById('navbar');
    let navTicking = false;
    window.addEventListener('scroll', () => {
      if (!navTicking) {
        window.requestAnimationFrame(() => {
          navbar.classList.toggle('scrolled', window.scrollY > 60);
          navTicking = false;
        });
        navTicking = true;
      }
    });

    // Booking modal
    const backdrop = document.getElementById('modalBackdrop');
    const modalCloseBtn = document.getElementById('modalClose');

    function openModal(e) {
      e.preventDefault();
      backdrop.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      backdrop.classList.remove('active');
      document.body.style.overflow = '';
    }

    document.querySelectorAll('[data-modal]').forEach(btn => {
      btn.addEventListener('click', openModal);
    });

    modalCloseBtn.addEventListener('click', closeModal);

    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
